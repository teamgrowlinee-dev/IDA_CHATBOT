services:
  - type: web
    name: ida-chatbot
    env: node
    buildCommand: npm install && npm --workspace app run build
    startCommand: node app/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8788
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_FAST_MODEL
        value: claude-3-5-haiku-20241022
      - key: ANTHROPIC_QUALITY_MODEL
        value: claude-sonnet-4-20250514
      - key: USE_OPENAI
        value: false
      - key: OPENAI_API_KEY
        sync: false
